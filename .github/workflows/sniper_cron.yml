name: Daily Stock Sniper

on:
  schedule:
    # 這是 UTC 時間。台灣時間減去 8 小時。
    # 這裡設定 UTC 05:00，也就是台灣時間每天下午 13:00 執行。
    # (讓您在 13:30 收盤前有半小時可以手動確認並下單)
    - cron: '0 5 * * 1-5' # 星期一到星期五的 UTC 05:00
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊測試

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests pytz

      - name: Run Sniper Bot
        run: python sniper_bot.py
